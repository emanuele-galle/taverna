# GitHub Actions Deploy Workflow
# Progetto: Taverna degli Amici (taverna.fodivps2.cloud)
#
# Secrets da configurare:
# - VPS_HOST: 72.61.184.133
# - VPS_USER: sviluppatore
# - SSH_PRIVATE_KEY: contenuto ~/.ssh/github_deploy

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_SLUG: taverna
  PROJECT_PATH: /var/www/projects/taverna

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PROJECT_PATH
          script: |
            cd $PROJECT_PATH

            # Pull latest changes
            git pull origin main

            # Rebuild and restart container
            /home/sviluppatore/scripts/docker-smart-rebuild.sh app --no-cache

      - name: Notify deployment
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PROJECT_SLUG
          script: |
            curl -s -X POST "https://n8n.fodivps2.cloud/webhook/deploy-notify" \
              -H "Content-Type: application/json" \
              -d "{\"project\": \"$PROJECT_SLUG\", \"status\": \"${{ job.status }}\", \"commit\": \"${{ github.sha }}\", \"actor\": \"${{ github.actor }}\"}" \
              || echo "Notification webhook failed (non-critical)"
